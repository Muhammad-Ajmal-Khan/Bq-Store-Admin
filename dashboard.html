<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BQ Store - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-gray-900 text-white flex flex-col">
        <div class="h-16 flex items-center justify-center border-b border-gray-700">
            <h1 class="text-2xl font-bold tracking-wider">BQ STORE</h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-3">
            <button id="nav-products" class="w-full flex items-center px-4 py-3 bg-gray-800 rounded-lg text-left font-medium transition hover:bg-gray-700">
                📦 Products
            </button>
            <button id="nav-categories" class="w-full flex items-center px-4 py-3 rounded-lg text-left font-medium transition hover:bg-gray-700 text-gray-400">
                🏷️ Categories
            </button>
        </nav>
        <div class="p-4 border-t border-gray-700">
            <button id="logout-btn" class="w-full flex items-center justify-center px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg font-bold transition">
                🚪 Logout
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col">
        <header class="h-16 bg-white shadow-sm flex items-center px-8 justify-between">
            <h2 id="page-title" class="text-2xl font-bold text-gray-800">Products</h2>
            <div class="text-sm font-medium text-gray-500 bg-gray-100 px-3 py-1 rounded-full">
                Admin Workspace
            </div>
        </header>

        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-8">
            
           <div id="products-view" class="block">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-medium text-gray-600">Manage your products</h3>
                    <button id="add-product-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700 shadow-md transition"> + Add Product </button>
                </div>
                
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 border-b border-gray-200">
                                <th class="p-4 font-semibold">Name</th>
                                <th class="p-4 font-semibold">Price</th>
                                <th class="p-4 font-semibold">Category</th>
                                <th class="p-4 font-semibold text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="products-tbody" class="divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="product-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                <div class="bg-white p-6 rounded-xl w-96 shadow-2xl">
                    <h2 class="text-xl font-bold mb-4">Add New Product</h2>
                    <form id="product-form">
                        <input type="text" id="prod-name" placeholder="Product Name" class="w-full mb-3 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                        <input type="number" id="prod-price" placeholder="Price ($)" class="w-full mb-3 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                        <input type="text" id="prod-category" placeholder="Category" class="w-full mb-5 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                        
                        <div class="flex justify-end space-x-3">
                            <button type="button" id="close-modal-btn" class="px-4 py-2 text-gray-600 bg-gray-200 rounded-lg hover:bg-gray-300 font-medium transition">Cancel</button>
                            <button type="submit" class="px-4 py-2 text-white bg-blue-600 rounded-lg hover:bg-blue-700 font-medium transition">Save</button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="categories-view" class="hidden">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-medium text-gray-600">Manage product categories</h3>
                    <button id="add-category-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700 shadow-md transition"> + Add Category </button>
                </div>
                
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 border-b border-gray-200">
                                <th class="p-4 font-semibold">Category Name</th>
                                <th class="p-4 font-semibold text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="categories-tbody" class="divide-y divide-gray-200">
                            </tbody>
                    </table>
                </div>
            </div>

            <div id="category-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                <div class="bg-white p-6 rounded-xl w-96 shadow-2xl">
                    <h2 class="text-xl font-bold mb-4">Add New Category</h2>
                    <form id="category-form">
                        <input type="text" id="cat-name" placeholder="Category Name (e.g. Laptops)" class="w-full mb-5 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" required>
                        
                        <div class="flex justify-end space-x-3">
                            <button type="button" id="close-cat-modal-btn" class="px-4 py-2 text-gray-600 bg-gray-200 rounded-lg hover:bg-gray-300 font-medium transition">Cancel</button>
                            <button type="submit" class="px-4 py-2 text-white bg-blue-600 rounded-lg hover:bg-blue-700 font-medium transition">Save</button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <script type="module" src="./src/js/dashboard.js"></script>
</body>
</html>
